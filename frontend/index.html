<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Czcionka Inter z Google Fonts. `preconnect` przyspiesza pobieranie,
         mówiąc przeglądarce, żeby wcześniej nawiązała połączenie z serwerem. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Menedżer Zadań ✦</title>
  </head>
  <body>
    <!-- Tu React "wstrzykuje" całą aplikację (zobacz main.jsx). -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
